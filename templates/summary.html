<!DOCTYPE html>
<html>
<head>
    <title>Summary</title>
</head>
<body>

<h2>Client Summary</h2>

{% if client %}
    <p>Name: {{ client.name }}</p>
    <p>Age: {{ client.age }}</p>
    <p>Weight: {{ client.weight }}</p>
    <p>Program: {{ client.program }}</p>
{% else %}
    <p>No client found</p>
{% endif %}

</body>
</html>
